name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE }}" | base64 -d > app/release.keystore

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: truenet123
        KEY_ALIAS: truenetwork
        KEY_PASSWORD: truenet123

    - name: Sign APK
      run: |
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore app/release.keystore \
          -storepass truenet123 -keypass truenet123 \
          app/build/outputs/apk/release/app-release-unsigned.apk truenetwork

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetIndicator-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
